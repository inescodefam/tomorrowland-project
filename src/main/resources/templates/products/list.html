<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>
<main class="container py-4">
    <h1 class="mb-4">Products</h1>
    <div class="row g-3">
        <div class="col-md-4" th:each="product : ${products}">
            <div class="card h-100">
                <div class="ratio ratio-4x3 bg-secondary bg-opacity-25 d-flex align-items-center justify-content-center">
                    <span class="text-muted small">Image</span>
                </div>
                <div class="card-body">
                    <h5 class="card-title" th:text="${product.name}">Ticket Name</h5>
                    <p class="card-text text-muted small" th:text="${product.description}">Description</p>
                    <p class="mb-1"><span class="fw-bold" th:text="${product.price}">0.00</span> EUR</p>
                    <p class="small text-muted mb-3">Stock: <span th:text="${product.stock}">0</span></p>
                    <p class="small text-danger fw-semibold mb-3" th:if="${product.stock <= 0}">Sold out</p>
                    <a class="btn btn-outline-primary w-100 mb-2" th:href="@{/products/{id}(id=${product.id})}">Details</a>
                    <form method="post" th:action="@{/cart/add}" class="d-flex gap-2 align-items-center"
                          th:if="${product.stock > 0}">
                        <input type="hidden" name="productId" th:value="${product.id}">
                        <input class="form-control form-control-sm" type="number" name="quantity" value="1" min="1" th:attr="max=${product.stock}" style="max-width: 5rem;">
                        <button type="submit" class="btn btn-success btn-sm flex-grow-1">Add to Cart</button>
                    </form>
                    <button type="button" class="btn btn-secondary btn-sm w-100" disabled
                            th:if="${product.stock <= 0}">Sold out</button>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
