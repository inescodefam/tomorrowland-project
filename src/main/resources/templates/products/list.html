<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Tickets</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        body {
            background: radial-gradient(circle at top, #2a2048 0%, #161028 45%, #0e0a1b 100%);
        }
        .tickets-hero {
            background: linear-gradient(135deg, rgba(131, 58, 180, 0.30), rgba(253, 29, 29, 0.22), rgba(252, 176, 69, 0.20));
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 1rem;
            color: #f8f9fa;
        }
        .ticket-card {
            cursor: pointer;
            transition: transform .18s ease, box-shadow .18s ease;
        }
        .ticket-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 0.85rem 1.4rem rgba(0, 0, 0, 0.28);
        }
        .ticket-card .card-body {
            display: flex;
            flex-direction: column;
        }
        .ticket-actions {
            margin-top: auto;
        }
    </style>
</head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>
<main class="container py-4">
    <section class="tickets-hero p-4 p-md-5 mb-4">
        <h1 class="mb-2">Tomorrowland Tickets</h1>
        <p class="mb-0">
            Tomorrowland is one of the world's most iconic electronic music festivals, bringing together
            legendary artists, immersive stage design, and fans from across the globe.
        </p>
    </section>
    <div class="row g-3">
        <div class="col-md-4" th:each="product : ${products}">
            <div class="card h-100 ticket-card" th:attr="data-href=@{/products/{id}(id=${product.id})}">
                <div class="ratio ratio-4x3 bg-secondary bg-opacity-25 d-flex align-items-center justify-content-center overflow-hidden">
                    <img th:if="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)}"
                         th:src="${product.imageUrl}"
                         th:alt="${product.name}"
                         class="w-100 h-100 object-fit-cover">
                    <span class="text-muted small" th:if="${product.imageUrl == null or #strings.isEmpty(product.imageUrl)}">Image</span>
                </div>
                <div class="card-body">
                    <h5 class="card-title" th:text="${product.name}">Ticket Name</h5>
                    <p class="card-text text-muted small" th:text="${product.description}">Description</p>
                    <p class="mb-1"><span class="fw-bold" th:text="${product.price}">0.00</span> EUR</p>
                    <p class="small text-muted mb-3">Stock: <span th:text="${product.stock}">0</span></p>
                    <div class="ticket-actions">
                    <a class="btn btn-outline-primary w-100 mb-2" th:href="@{/products/{id}(id=${product.id})}">Details</a>
                    <form method="post" th:action="@{/cart/add}" class="d-flex gap-2 align-items-center"
                          th:if="${product.stock > 0}">
                        <input type="hidden" name="productId" th:value="${product.id}">
                        <input class="form-control form-control-sm" type="number" name="quantity" value="1" min="1" th:attr="max=${product.stock}" style="max-width: 5rem;">
                        <button type="submit" class="btn btn-success btn-sm flex-grow-1">Add to Cart</button>
                    </form>
                    <button type="button" class="btn btn-secondary btn-sm w-100" disabled
                            th:if="${product.stock <= 0}">Sold out</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script>
    document.querySelectorAll('.ticket-card').forEach(card => {
        card.addEventListener('click', (event) => {
            if (event.target.closest('a, button, input, form')) {
                return;
            }
            const href = card.getAttribute('data-href');
            if (href) {
                window.location.href = href;
            }
        });
    });
</script>
</body>
</html>
