<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>
<main class="container py-4">
    <h1 class="mb-4">Products</h1>
    <div class="row g-3">
        <div class="col-md-4" th:each="product : ${products}">
            <div class="card h-100">
                <div class="card-body">
                    <h5 class="card-title" th:text="${product.name}">Ticket Name</h5>
                    <p class="card-text text-muted" th:text="${product.description}">Description</p>
                    <p class="fw-bold mb-3" th:text="${product.price}">0.00</p>
                    <a class="btn btn-primary w-100" th:href="@{/products/{id}(id=${product.id})}">View</a>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
