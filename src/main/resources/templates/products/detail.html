<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Product Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>
<main class="container py-4">
    <div class="row">
        <div class="col-lg-8">
            <h1 th:text="${product != null ? product.name : 'Product Name'}">Product Name</h1>
            <p class="text-muted" th:text="${product != null ? product.description : 'Description'}">Description</p>
            <p class="h4" th:text="${product != null ? product.price : '0.00'}">0.00</p>
            <p>Stock: <span th:text="${product != null ? product.stock : 0}">0</span></p>
            <form method="post" th:action="@{/cart/add}">
                <input type="hidden" name="productId" th:value="${product != null ? product.id : 0}">
                <div class="row g-2 align-items-end">
                    <div class="col-md-3">
                        <label class="form-label" for="product-quantity">Quantity</label>
                        <input id="product-quantity" class="form-control" type="number" name="quantity" value="1" min="1">
                    </div>
                    <div class="col-md-3">
                        <button type="submit" class="btn btn-success w-100">Add to Cart</button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</main>
</body>
</html>
