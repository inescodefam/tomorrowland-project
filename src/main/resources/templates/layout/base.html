<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle} ?: 'Tomorrowland Shop'">Tomorrowland Shop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark" th:fragment="navbar">
    <div class="container">
        <a class="navbar-brand" th:href="@{/products}">Tomorrowland Shop</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/products}">Products</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/categories}">Categories</a></li>
                <li class="nav-item" sec:authorize="hasRole('USER')">
                    <a class="nav-link" th:href="@{/orders/history}">My Orders</a>
                </li>
                <li class="nav-item dropdown" sec:authorize="hasRole('ADMIN')">
                    <button class="nav-link dropdown-toggle btn btn-link text-decoration-none" type="button"
                            data-bs-toggle="dropdown" aria-expanded="false">Admin</button>
                    <ul class="dropdown-menu">
                        <li><a class="dropdown-item" th:href="@{/admin/products}">Products</a></li>
                        <li><a class="dropdown-item" th:href="@{/admin/categories}">Categories</a></li>
                        <li><a class="dropdown-item" th:href="@{/admin/orders}">Orders</a></li>
                        <li><a class="dropdown-item" th:href="@{/admin/audit-log}">Audit Log</a></li>
                    </ul>
                </li>
            </ul>
            <div class="d-flex align-items-center gap-3">
                <a class="text-white text-decoration-none" th:href="@{/cart}">
                    Cart <span class="badge bg-warning text-dark" th:text="${cartItemCount} ?: 0">0</span>
                </a>
                <a class="btn btn-outline-light btn-sm" sec:authorize="isAnonymous()" th:href="@{/login}">Login</a>
                <form sec:authorize="isAuthenticated()" method="post" th:action="@{/logout}">
                    <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </div>
</nav>

<main class="container py-4" th:fragment="content">
    <div class="alert alert-info">Replace this content in child templates.</div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
