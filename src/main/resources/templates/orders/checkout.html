<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/tomorrowland-theme.css}">
    <script th:if="${paypalClientId != null and !#strings.isEmpty(paypalClientId)}"
            th:src="|https://www.paypal.com/sdk/js?client-id=${paypalClientId}&currency=EUR|"></script>
    <meta th:name="_csrf" th:content="${_csrf.token}"/>
    <meta th:name="_csrf_header" th:content="${_csrf.headerName}"/>
</head>
<body class="tml-bg">
<div th:replace="~{layout/base :: navbar}"></div>
<main class="container py-4">
    <section class="tickets-hero p-4 p-md-5 mb-4">
        <h1 class="mb-2">Checkout</h1>
        <p class="mb-0">Finalize your ticket order and get ready for the Tomorrowland experience.</p>
    </section>
    <div th:if="${checkoutError}" class="alert alert-warning" th:text="${checkoutError}"></div>
    <div class="row g-4">
        <div class="col-lg-7 checkout-summary">
            <h5 class="mb-3 checkout-summary-title">Order summary</h5>
            <ul class="list-group mb-3 checkout-summary-list">
                <li class="list-group-item d-flex justify-content-between checkout-summary-item" th:each="item : ${cart.items}">
                    <span th:text="|${item.productName} × ${item.quantity}|">Item</span>
                    <span th:text="${#numbers.formatDecimal(item.lineTotal, 1, 'COMMA', 2, 'POINT')}">0</span>
                </li>
            </ul>
            <p class="h5 checkout-summary-total">Total: <span th:text="${#numbers.formatDecimal(total, 1, 'COMMA', 2, 'POINT')}">0.00</span> EUR</p>
        </div>
        <div class="col-lg-5">
            <div class="card checkout-payment-card">
                <div class="card-body">
                    <h5 class="card-title">Payment</h5>
                    <form method="post" th:action="@{/orders/checkout}" class="d-grid gap-2">
                        <input type="hidden" name="paymentMethod" value="CASH_ON_DELIVERY">
                        <button type="submit" class="btn btn-primary">Pay on Delivery</button>
                    </form>
                    <div th:if="${paypalClientId != null and !#strings.isEmpty(paypalClientId)}"
                         id="paypal-button-container" class="mt-3"></div>
                    <div th:if="${paypalClientId == null or #strings.isEmpty(paypalClientId)}"
                         class="alert alert-warning mt-3 mb-0">
                        PayPal is unavailable: missing PAYPAL_CLIENT_ID configuration.
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script th:inline="javascript">
    if (typeof paypal === 'undefined') {
        const container = document.getElementById('paypal-button-container');
        if (container) {
            container.innerHTML =
                '<div class="alert alert-warning mb-0">PayPal SDK could not be loaded. Check browser blockers and PAYPAL_CLIENT_ID.</div>';
        }
    } else {
        paypal.Buttons({
        createOrder: function () {
            const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
            const csrfToken = document.querySelector('meta[name="_csrf"]').content;
            return fetch('/orders/paypal/create', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    [csrfHeader]: csrfToken
                }
            })
                .then(function (res) {
                    return res.json();
                })
                .then(function (data) {
                    if (data.error) {
                        throw new Error(data.error);
                    }
                    return data.paypalOrderId;
                });
        },
        onApprove: function (data) {
            const csrfHeader = document.querySelector('meta[name="_csrf_header"]').content;
            const csrfToken = document.querySelector('meta[name="_csrf"]').content;
            return fetch('/orders/paypal/capture?paypalOrderId=' + data.orderID, {
                method: 'POST',
                headers: {
                    [csrfHeader]: csrfToken
                }
            })
                .then(function (res) {
                    return res.json();
                })
                .then(function (orderData) {
                    if (orderData.error) {
                        throw new Error(orderData.error);
                    }
                    window.location.href = '/orders/confirmation?orderId=' + orderData.orderId;
                });
        },
        onCancel: function () {
            window.location.href = '/cart?message=paypal-cancelled';
        },
        onError: function (err) {
            console.error('PayPal error:', err);
            window.location.href = '/cart?message=paypal-error';
        }
        }).render('#paypal-button-container');
    }
</script>
</body>
</html>
