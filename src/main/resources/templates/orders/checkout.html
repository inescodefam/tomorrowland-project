<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>
<main class="container py-4">
    <h1>Checkout</h1>
    <div class="row g-4">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h5>Cash on Delivery</h5>
                    <form method="post" th:action="@{/orders/checkout}">
                        <input type="hidden" name="paymentMethod" value="CASH_ON_DELIVERY">
                        <button class="btn btn-outline-primary mt-2">Place COD Order</button>
                    </form>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <h5>PayPal</h5>
                    <div id="paypal-button-container" class="mt-3"></div>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="https://www.paypal.com/sdk/js?client-id=test&currency=EUR"></script>
<script>
    if (window.paypal) {
      paypal.Buttons({
        createOrder: async () => "DUMMY_ORDER_ID",
        onApprove: () => window.location.href = "/orders/paypal/success",
        onCancel: () => window.location.href = "/orders/paypal/cancel"
      }).render('#paypal-button-container');
    }
</script>
</body>
</html>
