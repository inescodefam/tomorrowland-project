<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Checkout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>
<main class="container py-4">
    <h1 class="mb-4">Checkout</h1>
    <div th:if="${checkoutError}" class="alert alert-warning" th:text="${checkoutError}"></div>
    <div class="row g-4">
        <div class="col-lg-7">
            <h5 class="mb-3">Order summary</h5>
            <ul class="list-group mb-3">
                <li class="list-group-item d-flex justify-content-between" th:each="item : ${cart.items}">
                    <span th:text="|${item.productName} × ${item.quantity}|">Item</span>
                    <span th:text="${#numbers.formatDecimal(item.lineTotal, 1, 'COMMA', 2, 'POINT')}">0</span>
                </li>
            </ul>
            <p class="h5">Total: <span th:text="${#numbers.formatDecimal(total, 1, 'COMMA', 2, 'POINT')}">0.00</span> EUR</p>
        </div>
        <div class="col-lg-5">
            <div class="card">
                <div class="card-body">
                    <h5 class="card-title">Payment</h5>
                    <form method="post" th:action="@{/orders/checkout}" class="d-grid gap-2">
                        <input type="hidden" name="paymentMethod" value="CASH_ON_DELIVERY">
                        <button type="submit" class="btn btn-primary">Pay on Delivery</button>
                    </form>
                    <form method="post" th:action="@{/orders/checkout}" class="d-grid gap-2 mt-2">
                        <input type="hidden" name="paymentMethod" value="PAYPAL">
                        <button type="submit" class="btn btn-outline-primary">Pay with PayPal</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
