<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order History</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        body { background: radial-gradient(circle at top, #2a2048 0%, #161028 45%, #0e0a1b 100%); }
        .panel {
            background: linear-gradient(140deg, rgba(131,58,180,.24), rgba(253,29,29,.14), rgba(252,176,69,.14));
            border: 1px solid rgba(255,255,255,.14);
            border-radius: 1rem;
            color: #f8f9fa;
        }
    </style>
</head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>
<main class="container py-4">
    <div class="panel p-3 p-md-4">
    <h1 class="mb-4">Order History</h1>
    <div class="table-responsive">
        <table class="table table-striped align-middle">
            <thead>
            <tr>
                <th>Date</th>
                <th>Items</th>
                <th>Total</th>
                <th>Payment</th>
                <th>Status</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}">date</td>
                <td class="small">
                    <th:block th:each="line, iter : ${order.orderItems}">
                        <span th:text="|${line.productName} × ${line.quantity}|">item</span>
                        <span th:if="${!iter.last}">, </span>
                    </th:block>
                </td>
                <td th:text="${#numbers.formatDecimal(order.total, 1, 'COMMA', 2, 'POINT')}">0.00</td>
                <td th:text="${order.paymentMethod}">COD</td>
                <td><span class="badge bg-secondary" th:text="${order.status}">PENDING</span></td>
            </tr>
            </tbody>
        </table>
    </div>
    <p th:if="${#lists.isEmpty(orders)}" class="text-muted">No orders yet.</p>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
