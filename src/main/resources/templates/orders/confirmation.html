<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Confirmation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>
<main class="container py-5 text-center">
    <h1 class="text-success">Order Confirmed</h1>
    <p class="lead">Your order <strong th:text="${orderId}">#123</strong> has been placed successfully.</p>
    <a class="btn btn-primary" th:href="@{/orders/history}">View Order History</a>
</main>
</body>
</html>
