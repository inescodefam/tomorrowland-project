<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Confirmation</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/tomorrowland-theme.css}">
</head>
<body class="tml-bg">
<div th:replace="~{layout/base :: navbar}"></div>
<main class="container py-5">
    <div class="text-center mb-4 panel p-4">
        <h1 class="text-success">Order confirmed</h1>
        <p class="lead">Thank you — order <strong th:text="${order != null ? '#' + order.id : ''}">#123</strong> is complete.</p>
    </div>
    <div class="card mx-auto confirmation-summary-card" style="max-width: 560px;" th:if="${order != null}">
        <div class="card-body confirmation-summary-body">
            <h5 class="card-title">Summary</h5>
            <ul class="list-group list-group-flush mb-3 confirmation-summary-list">
                <li class="list-group-item d-flex justify-content-between confirmation-summary-item" th:each="line : ${order.orderItems}">
                    <span th:text="|${line.productName} × ${line.quantity}|">item</span>
                    <span th:text="${#numbers.formatDecimal(line.lineTotal, 1, 'COMMA', 2, 'POINT')}">0</span>
                </li>
            </ul>
            <p class="mb-1"><strong>Total:</strong> <span th:text="${#numbers.formatDecimal(order.total, 1, 'COMMA', 2, 'POINT')}">0</span> EUR</p>
            <p class="mb-1"><strong>Payment:</strong> <span th:text="${order.paymentMethod}">COD</span></p>
            <p class="mb-0"><strong>Status:</strong> <span class="badge tml-status-badge" th:text="${order.status}">PAID</span></p>
        </div>
    </div>
    <div class="text-center mt-4">
        <a class="btn btn-primary" th:href="@{/orders/history}">Order history</a>
        <a class="btn btn-outline-secondary" th:href="@{/products}">Continue shopping</a>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
