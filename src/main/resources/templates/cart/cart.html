<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/tomorrowland-theme.css}">
</head>
<body class="tml-bg">
<div th:replace="~{layout/base :: navbar}"></div>
<main class="container py-4">
    <div class="panel p-3 p-md-4">
    <h1 class="mb-4">Shopping Cart</h1>
    <div th:if="${param.empty != null}" class="alert alert-warning">Your cart is empty — add tickets from the catalog.</div>
    <div th:if="${checkoutError}" class="alert alert-warning" th:text="${checkoutError}"></div>
    <div th:if="${paypalMessage}" class="alert alert-info" th:text="${paypalMessage}"></div>
    <div class="table-responsive" th:unless="${#lists.isEmpty(cart.items)}">
        <table class="table align-middle">
            <thead>
            <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Qty</th>
                <th>Subtotal</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="item : ${cart.items}">
                <td th:text="${item.productName}">Item</td>
                <td th:text="${#numbers.formatDecimal(item.price, 1, 'COMMA', 2, 'POINT')}">0.00</td>
                <td>
                    <form class="d-flex gap-1 align-items-center" method="post" th:action="@{/cart/update}">
                        <input type="hidden" name="_method" value="put">
                        <input type="hidden" name="productId" th:value="${item.productId}">
                        <input class="form-control form-control-sm" type="number" name="quantity" th:value="${item.quantity}" min="1" style="width: 4.5rem;">
                        <button type="submit" class="btn btn-sm btn-outline-secondary">Update</button>
                    </form>
                </td>
                <td th:text="${#numbers.formatDecimal(item.lineTotal, 1, 'COMMA', 2, 'POINT')}">0.00</td>
                <td>
                    <form method="post" th:action="@{/cart/remove}">
                        <input type="hidden" name="_method" value="delete">
                        <input type="hidden" name="productId" th:value="${item.productId}">
                        <button type="submit" class="btn btn-sm btn-outline-danger">Remove</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <p th:if="${#lists.isEmpty(cart.items)}" class="text-light fs-5">Your cart is empty.</p>
    <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between mt-3" th:unless="${#lists.isEmpty(cart.items)}">
        <form method="post" th:action="@{/cart/clear}">
            <input type="hidden" name="_method" value="delete">
            <button type="submit" class="btn btn-outline-secondary">Clear cart</button>
        </form>
        <h4 class="mb-0">Total: <span th:text="${#numbers.formatDecimal(total, 1, 'COMMA', 2, 'POINT')}">0.00</span> EUR</h4>
    </div>
    <div class="mt-4" th:unless="${#lists.isEmpty(cart.items)}">
        <a class="btn btn-primary" sec:authorize="hasRole('USER')" th:href="@{/orders/checkout}">Proceed to Checkout</a>
        <a class="btn btn-primary" sec:authorize="!hasRole('USER')" th:href="@{/login}">Login to checkout</a>
    </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
