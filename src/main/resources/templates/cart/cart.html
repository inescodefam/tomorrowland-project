<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cart</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>
<main class="container py-4">
    <h1>Shopping Cart</h1>
    <div class="table-responsive">
        <table class="table align-middle">
            <thead>
            <tr><th>Product</th><th>Price</th><th>Qty</th><th>Total</th><th></th></tr>
            </thead>
            <tbody>
            <tr th:each="item : ${cartItems}">
                <td th:text="${item.product.name}">Item</td>
                <td th:text="${item.product.price}">0.00</td>
                <td th:text="${item.quantity}">1</td>
                <td th:text="${item.total}">0.00</td>
                <td>
                    <form method="post" th:action="@{/cart/remove}">
                        <input type="hidden" name="_method" value="delete">
                        <input type="hidden" name="productId" th:value="${item.product.id}">
                        <button class="btn btn-sm btn-outline-danger">Remove</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <div class="d-flex justify-content-between">
        <h4>Total: <span th:text="${cartTotal}">0.00</span></h4>
        <a class="btn btn-primary" th:href="@{/orders/checkout}">Checkout</a>
    </div>
</main>
</body>
</html>
