<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit product</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>
<main class="container py-4">
    <h1 class="mb-4">Edit product</h1>
    <form class="row g-3" method="post" th:action="@{/admin/products/{id}(id=${product.id})}" th:if="${product != null}">
        <div class="col-md-6">
            <label class="form-label" for="product-edit-name">Name</label>
            <input id="product-edit-name" class="form-control" name="name" th:value="${product.name}" required>
        </div>
        <div class="col-12">
            <label class="form-label" for="product-edit-description">Description</label>
            <input id="product-edit-description" class="form-control" name="description" th:value="${product.description}">
        </div>
        <div class="col-md-3">
            <label class="form-label" for="product-edit-price">Price</label>
            <input id="product-edit-price" class="form-control" name="price" type="number" step="0.01" th:value="${product.price}" required>
        </div>
        <div class="col-md-3">
            <label class="form-label" for="product-edit-stock">Stock</label>
            <input id="product-edit-stock" class="form-control" name="stock" type="number" th:value="${product.stock}" required>
        </div>
        <div class="col-md-6">
            <label class="form-label" for="product-edit-category">Category</label>
            <select id="product-edit-category" class="form-select" name="categoryId" required>
                <option th:each="c : ${categories}"
                        th:value="${c.id}"
                        th:selected="${product.category != null and product.category.id == c.id}"
                        th:text="${c.name}">Cat</option>
            </select>
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-primary">Save</button>
            <a class="btn btn-outline-secondary" th:href="@{/admin/products}">Cancel</a>
        </div>
    </form>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
