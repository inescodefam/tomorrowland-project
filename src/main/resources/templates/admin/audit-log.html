<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin — Audit log</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>
<main class="container py-4">
    <h1 class="mb-4">Login audit log</h1>
    <div class="table-responsive">
        <table class="table table-bordered table-striped align-middle">
            <thead>
            <tr>
                <th>Username</th>
                <th>IP address</th>
                <th>Timestamp</th>
                <th>Success</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="entry : ${auditLog}">
                <td th:text="${entry.username}">user</td>
                <td th:text="${entry.ipAddress}">127.0.0.1</td>
                <td th:text="${#temporals.format(entry.createdAt, 'yyyy-MM-dd HH:mm:ss')}">time</td>
                <td>
                    <span class="badge" th:classappend="${entry.success} ? 'bg-success' : 'bg-danger'"
                          th:text="${entry.success} ? 'OK' : 'Fail'">OK</span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
