<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login Audit Log</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>
<main class="container py-4">
    <h1>Login Audit Log</h1>
    <table class="table table-bordered">
        <thead><tr><th>User</th><th>IP</th><th>Time</th><th>Success</th></tr></thead>
        <tbody>
        <tr th:each="entry : ${auditEntries}">
            <td th:text="${entry.username}">user</td>
            <td th:text="${entry.ipAddress}">127.0.0.1</td>
            <td th:text="${entry.createdAt}">time</td>
            <td>
                <span class="badge" th:classappend="${entry.success} ? 'bg-success' : 'bg-danger'"
                      th:text="${entry.success} ? 'YES' : 'NO'">YES</span>
            </td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
