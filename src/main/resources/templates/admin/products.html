<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin — Products</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>
<main class="container py-4">
    <h1 class="mb-4">Manage products</h1>
    <div class="table-responsive">
        <table class="table table-striped align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Category</th>
                <th></th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="product : ${products}">
                <td th:text="${product.id}">1</td>
                <td th:text="${product.name}">Name</td>
                <td th:text="${product.price}">0</td>
                <td th:text="${product.stock}">0</td>
                <td th:text="${product.category != null ? product.category.name : '-'}">Cat</td>
                <td class="text-nowrap">
                    <a class="btn btn-sm btn-outline-secondary" th:href="@{/admin/products/{id}/edit(id=${product.id})}">Edit</a>
                    <form class="d-inline" method="post" th:action="@{/admin/products/{id}/delete(id=${product.id})}">
                        <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
    <h5 class="mt-5">Create product</h5>
    <form class="row g-2" method="post" th:action="@{/admin/products}">
        <div class="col-md-4">
            <input class="form-control" name="name" placeholder="Name" required>
        </div>
        <div class="col-md-4">
            <input class="form-control" name="description" placeholder="Description">
        </div>
        <div class="col-md-4">
            <input class="form-control" name="imageUrl" placeholder="Image URL (https://...)">
        </div>
        <div class="col-md-2">
            <input class="form-control" name="price" type="number" step="0.01" placeholder="Price" required>
        </div>
        <div class="col-md-2">
            <input class="form-control" name="stock" type="number" placeholder="Stock" required>
        </div>
        <div class="col-md-4">
            <select class="form-select" name="categoryId" required>
                <option value="" disabled selected>Category</option>
                <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}">Cat</option>
            </select>
        </div>
        <div class="col-12">
            <button type="submit" class="btn btn-success">Create</button>
        </div>
    </form>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
