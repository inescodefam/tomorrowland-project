<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>
<main class="container py-4">
    <h1 class="mb-3">Orders</h1>
    <form class="row g-2 mb-3" method="get" th:action="@{/admin/orders}">
        <div class="col-md-3"><input name="userId" class="form-control" placeholder="User ID"></div>
        <div class="col-md-3"><input name="from" type="date" class="form-control"></div>
        <div class="col-md-3"><input name="to" type="date" class="form-control"></div>
        <div class="col-md-3"><button class="btn btn-primary w-100">Filter</button></div>
    </form>
    <table class="table table-hover">
        <thead><tr><th>ID</th><th>User</th><th>Date</th><th>Status</th><th>Total</th></tr></thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}">1</td>
            <td th:text="${order.user.username}">user</td>
            <td th:text="${order.createdAt}">date</td>
            <td th:text="${order.status}">status</td>
            <td th:text="${order.total}">0.00</td>
        </tr>
        </tbody>
    </table>
</main>
</body>
</html>
