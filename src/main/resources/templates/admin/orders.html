<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin — Orders</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>
<main class="container py-4">
    <h1 class="mb-3">Orders</h1>
    <form class="row g-2 mb-4" method="get" th:action="@{/admin/orders}">
        <div class="col-md-4">
            <label class="form-label small">Username contains</label>
            <input name="username" class="form-control" placeholder="Username">
        </div>
        <div class="col-md-3">
            <label class="form-label small">From</label>
            <input name="from" type="datetime-local" class="form-control">
        </div>
        <div class="col-md-3">
            <label class="form-label small">To</label>
            <input name="to" type="datetime-local" class="form-control">
        </div>
        <div class="col-md-2 d-flex align-items-end">
            <button class="btn btn-primary w-100" type="submit">Filter</button>
        </div>
    </form>
    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead>
            <tr>
                <th>ID</th>
                <th>Buyer</th>
                <th>Date</th>
                <th>Total</th>
                <th>Payment</th>
                <th>Status</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td th:text="${order.id}">1</td>
                <td th:text="${order.user.username}">user</td>
                <td th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}">date</td>
                <td th:text="${#numbers.formatDecimal(order.total, 1, 'COMMA', 2, 'POINT')}">0</td>
                <td th:text="${order.paymentMethod}">-</td>
                <td><span class="badge bg-secondary" th:text="${order.status}">status</span></td>
            </tr>
            </tbody>
        </table>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
