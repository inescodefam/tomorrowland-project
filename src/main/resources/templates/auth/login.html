<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/auth-theme.css}">
</head>
<body class="auth-bg">
<div th:replace="~{layout/base :: navbar}"></div>
<main class="auth-wrap">
    <div class="auth-card login-card p-4 p-md-5">
        <h1 class="h3 mb-3">Welcome Back</h1>
        <p class="small text-light-emphasis mb-4">Sign in to continue your Tomorrowland ticket journey.</p>
        <div th:if="${param.error}" class="alert alert-danger">Invalid username or password.</div>
        <div th:if="${param.registered}" class="alert alert-success">Registration successful. Please sign in.</div>
        <form method="post" th:action="@{/login}">
            <div class="mb-3">
                <label class="form-label" for="username">Username</label>
                <input id="username" class="form-control" type="text" name="username" required autocomplete="username">
            </div>
            <div class="mb-3">
                <label class="form-label" for="password">Password</label>
                <input id="password" class="form-control" type="password" name="password" required autocomplete="current-password">
            </div>
            <button class="btn btn-tml w-100">Sign in</button>
        </form>
        <p class="mt-3 text-center mb-0">No account? <a class="auth-link" th:href="@{/register}">Register</a></p>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
