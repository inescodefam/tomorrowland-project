<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>
<main class="container py-5" style="max-width: 520px;">
    <h1 class="h3 mb-3">Create Account</h1>
    <form method="post" th:action="@{/register}">
        <div class="mb-3">
            <label class="form-label" for="register-username">Username</label>
            <input id="register-username" class="form-control" type="text" name="username" required>
        </div>
        <div class="mb-3">
            <label class="form-label" for="register-email">Email</label>
            <input id="register-email" class="form-control" type="email" name="email" required>
        </div>
        <div class="mb-3">
            <label class="form-label" for="register-password">Password</label>
            <input id="register-password" class="form-control" type="password" name="password" required>
        </div>
        <button class="btn btn-success w-100">Register</button>
    </form>
</main>
</body>
</html>
