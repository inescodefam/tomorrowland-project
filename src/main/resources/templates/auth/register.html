<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div th:replace="~{layout/base :: navbar}"></div>
<main class="container py-5" style="max-width: 520px;">
    <h1 class="h3 mb-3">Create account</h1>
    <div th:if="${registerError}" class="alert alert-warning" th:text="${registerError}"></div>
    <form method="post" th:action="@{/register}">
        <div class="mb-3">
            <label class="form-label" for="register-username">Username</label>
            <input id="register-username" class="form-control" type="text" name="username" required autocomplete="username">
        </div>
        <div class="mb-3">
            <label class="form-label" for="register-email">Email</label>
            <input id="register-email" class="form-control" type="email" name="email" required autocomplete="email">
        </div>
        <div class="mb-3">
            <label class="form-label" for="register-password">Password</label>
            <input id="register-password" class="form-control" type="password" name="password" required autocomplete="new-password">
        </div>
        <button class="btn btn-success w-100">Register</button>
    </form>
    <p class="mt-3 text-center"><a th:href="@{/login}">Back to login</a></p>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
