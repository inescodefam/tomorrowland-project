<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Categories</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/tomorrowland-theme.css}">
</head>
<body class="tml-bg">
<div th:replace="~{layout/base :: navbar}"></div>
<main class="container py-4">
    <section class="hero p-4 p-md-5 mb-4">
        <h1 class="mb-2">Ticket Categories</h1>
        <p class="mb-0">Explore different ways to experience Tomorrowland, from weekend passes to one-day entries.</p>
    </section>
    <div class="list-group">
        <a class="list-group-item list-group-item-action" th:each="cat : ${categories}"
           th:href="@{/categories/{id}(id=${cat.id})}">
            <div class="d-flex w-100 justify-content-between">
                <h5 class="mb-1" th:text="${cat.name}">Name</h5>
            </div>
            <p class="mb-1 text-muted small" th:text="${cat.description}">Description</p>
        </a>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
