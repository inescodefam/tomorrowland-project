<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Category</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/tomorrowland-theme.css}">
</head>
<body class="tml-bg">
<div th:replace="~{layout/base :: navbar}"></div>
<main class="container py-4">
    <div class="panel p-3 p-md-4">
    <h1 class="mb-2" th:text="${category.name}">Category</h1>
    <p class="text-muted mb-4" th:text="${category.description}">Description</p>
    <div class="row g-3">
        <div class="col-md-4" th:each="product : ${products}">
            <div class="card h-100 category-product-card">
                <div class="card-body">
                    <h5 class="card-title" th:text="${product.name}">Product</h5>
                    <p class="small text-muted" th:text="${product.description}">Desc</p>
                    <p class="fw-bold" th:text="${#numbers.formatDecimal(product.price, 1, 'COMMA', 2, 'POINT')} + ' EUR'">0</p>
                    <a class="btn btn-sm btn-primary" th:href="@{/products/{id}(id=${product.id})}">View</a>
                </div>
            </div>
        </div>
    </div>
    <p th:if="${#lists.isEmpty(products)}" class="text-muted mt-3">No products in this category.</p>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
